<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Board — Test</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand-row">
        <div class="brand">
          <span class="brand-icon">✓</span>
          <div>
            <h1>Task Board</h1>
            <p class="subtitle">Updated Jul 4, 2026 · 6:54 PM</p>
          </div>
        </div>
        <button type="button" class="theme-btn" id="themeToggle" aria-label="Toggle theme">☀</button>
      </div>

      <div class="stats-card">
        <div class="progress-ring" id="progressRing" style="--progress: 0">
          <span id="progressPercent">0%</span>
        </div>
        <div class="stats-grid">
          <div class="stat">
            <span class="stat-value" id="statTotal">0</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="statActive">0</span>
            <span class="stat-label">Active</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="statDone">0</span>
            <span class="stat-label">Done</span>
          </div>
        </div>
        <p class="overdue-note" id="overdueNote" hidden></p>
      </div>

      <nav class="filters" role="tablist" aria-label="Filter tasks">
        <button type="button" class="filter active" data-filter="all">
          <span>All tasks</span>
          <span class="filter-count" id="countAll">0</span>
        </button>
        <button type="button" class="filter" data-filter="active">
          <span>Active</span>
          <span class="filter-count" id="countActive">0</span>
        </button>
        <button type="button" class="filter" data-filter="completed">
          <span>Completed</span>
          <span class="filter-count" id="countCompleted">0</span>
        </button>
        <button type="button" class="filter" data-filter="due-today">
          <span>Due today</span>
          <span class="filter-count" id="countDueToday">0</span>
        </button>
        <button type="button" class="filter" data-filter="overdue">
          <span>Overdue</span>
          <span class="filter-count" id="countOverdue">0</span>
        </button>
        <button type="button" class="filter" data-filter="high-priority">
          <span>High priority</span>
          <span class="filter-count" id="countHighPriority">0</span>
        </button>
        <button type="button" class="filter" data-filter="pinned">
          <span>Pinned</span>
          <span class="filter-count" id="countPinned">0</span>
        </button>
      </nav>

      <div class="category-filters" id="categoryFilters">
        <span class="category-label">Categories</span>
      </div>

      <div class="sidebar-actions">
        <button type="button" class="action-btn" id="exportBtn">
          Export tasks
        </button>
        <button type="button" class="action-btn" id="importBtn">
          Import tasks
        </button>
        <input type="file" id="importFile" accept="application/json" hidden />
        <button type="button" class="action-btn" id="completeAll" hidden>
          Complete all active
        </button>
        <button type="button" class="clear-btn" id="clearCompleted" hidden>
          Clear completed
        </button>
        <p class="hint">Saved locally · <kbd>/</kbd> search · <kbd>N</kbd> new · <kbd>Esc</kbd> clear</p>
      </div>
    </aside>

    <main class="main">
      <header class="main-header">
        <div>
          <h2 id="panelTitle">All tasks</h2>
          <p class="main-subtitle" id="itemCount">0 items left</p>
        </div>
        <select id="sortSelect" class="sort-select" aria-label="Sort tasks">
          <option value="newest">Newest first</option>
          <option value="priority">Priority</option>
          <option value="due">Due date</option>
          <option value="alpha">A → Z</option>
        </select>
      </header>

      <form class="add-form" id="addForm">
        <input
          type="text"
          id="todoInput"
          placeholder="Add a new task..."
          autocomplete="off"
          maxlength="200"
        />
        <select id="categorySelect" class="field-select" aria-label="Category">
          <option value="work">Work</option>
          <option value="personal">Personal</option>
          <option value="shopping">Shopping</option>
          <option value="other">Other</option>
        </select>
        <select id="prioritySelect" class="field-select" aria-label="Priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <input type="date" id="dueDateInput" class="field-date" aria-label="Due date" />
        <button type="submit">Add task</button>
      </form>

      <div class="search-wrap">
        <input
          type="search"
          id="searchInput"
          placeholder="Search tasks..."
          autocomplete="off"
        />
      </div>

      <ul class="todo-list" id="todoList"></ul>
    </main>
  </div>

  <div class="toast" id="toast" hidden>
    <span id="toastMessage">Task deleted</span>
    <button type="button" id="undoBtn">Undo</button>
  </div>

  <template id="todoTemplate">
    <li class="todo-item">
      <button type="button" class="pin-btn" aria-label="Pin task" title="Pin task">☆</button>
      <label class="todo-label">
        <input type="checkbox" class="todo-check" />
        <span class="todo-body">
          <span class="todo-text"></span>
          <span class="todo-meta">
            <span class="category-badge"></span>
            <span class="priority-badge"></span>
            <span class="due-badge"></span>
          </span>
        </span>
      </label>
      <div class="todo-actions">
        <button type="button" class="duplicate-btn" aria-label="Duplicate">Copy</button>
        <button type="button" class="edit-btn" aria-label="Edit">Edit</button>
        <button type="button" class="delete-btn" aria-label="Delete">Delete</button>
      </div>
    </li>
  </template>

  <script src="app.js"></script>
</body>
</html>
